<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 980 520" width="980" class="arch-svg" role="img" aria-label="The six-stage offline pipeline and the two versioned data contracts">
  <style>
    .arch-svg text { font-family: Inter, "Segoe UI", system-ui, sans-serif; }
    .arch-svg .mono { font-family: ui-monospace, Consolas, monospace; }
    .arch-svg .bx { fill: var(--panel-2); stroke: var(--border); stroke-width: 1.2; }
    .arch-svg .bx-hi { stroke: var(--accent); stroke-width: 1.6; }
    .arch-svg .bx-net { stroke: var(--accent-2); stroke-width: 1.6; }
    .arch-svg .bx-store { stroke: var(--good); stroke-width: 1.6; }
    .arch-svg .bx-warn { stroke: var(--warn); stroke-width: 1.6; }
    .arch-svg .grp { fill: none; stroke: var(--border); stroke-dasharray: 5 4; }
    .arch-svg .ttl { fill: var(--text); font-size: 13px; font-weight: 600; }
    .arch-svg .sub { fill: var(--muted); font-size: 10px; }
    .arch-svg .it { fill: var(--text); font-size: 10.5px; }
    .arch-svg .cd { fill: var(--accent); font-size: 9.5px; }
    .arch-svg .mu { fill: var(--muted); font-size: 10px; }
    .arch-svg .flow { fill: none; stroke: var(--muted); stroke-width: 1.5; }
    .arch-svg .flow-net { fill: none; stroke: var(--accent-2); stroke-width: 1.5; }
    .arch-svg .flow-store { fill: none; stroke: var(--good); stroke-width: 1.5; }
    .arch-svg .lbl { fill: var(--muted); font-size: 9.5px; }
  </style>
  <defs>
    <marker id="offline-pipeline-arrow" viewBox="0 0 8 8" refX="7" refY="4" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L8,4 L0,8 z" fill="var(--muted)"/>
    </marker>
  </defs>

  <!-- ===== Title ===== -->
  <text class="ttl" x="20" y="30" style="font-size:15px;">Offline pipeline &#8212; 6 deterministic stages, pure function of (case, seed)</text>

  <!-- ===== TOP BAND: INGESTION CONTRACT ===== -->
  <rect class="bx bx-store" x="20" y="52" width="252" height="78" rx="10"/>
  <text class="sub" x="34" y="72" style="fill:var(--good);font-weight:600;">INGESTION CONTRACT</text>
  <text class="it"  x="34" y="90">observation tables (inverse cases)</text>
  <text class="cd mono" x="34" y="106">io/contract.py &#183; io/schema.py</text>
  <text class="mu"  x="34" y="122">schema + explicit outlier policy</text>

  <!-- flow-store: contract -> preprocess -->
  <path class="flow-store" d="M146,130 L146,176" marker-end="url(#offline-pipeline-arrow)"/>
  <text class="lbl" x="154" y="158" style="fill:var(--good);">inverse obs</text>

  <!-- ===== CENTER: SIX-STAGE CHAIN ===== -->
  <!-- Row geometry: boxes 142 wide, 96 tall, top y=180, 14px gaps -->

  <!-- 1. preprocess -->
  <rect class="bx" x="20" y="180" width="142" height="96" rx="9"/>
  <text class="sub" x="32" y="200" style="font-weight:600;">1 &#183; preprocess</text>
  <text class="cd mono" x="32" y="216">stages/preprocess.py</text>
  <text class="it"  x="32" y="238">resolve spec;</text>
  <text class="it"  x="32" y="253">validate</text>
  <text class="it"  x="32" y="268">observations</text>

  <!-- 2. feature_extraction -->
  <rect class="bx" x="176" y="180" width="142" height="96" rx="9"/>
  <text class="sub" x="188" y="200" style="font-weight:600;">2 &#183; feature_extr.</text>
  <text class="cd mono" x="188" y="216" style="font-size:7.4px;">stages/feature_extraction.py</text>
  <text class="it"  x="188" y="238">build eval grid</text>

  <!-- 3. train (highlighted) -->
  <rect class="bx bx-hi" x="332" y="180" width="142" height="96" rx="9"/>
  <text class="sub" x="344" y="200" style="font-weight:600;fill:var(--accent);">3 &#183; train</text>
  <text class="cd mono" x="344" y="216">stages/train.py</text>
  <text class="it"  x="344" y="238">DeepXDE Adam</text>
  <text class="it"  x="344" y="253">&#8594; L-BFGS (+RAR)</text>
  <text class="it"  x="344" y="268">&#8594; ONNX + parity</text>

  <!-- 4. infer -->
  <rect class="bx" x="488" y="180" width="142" height="96" rx="9"/>
  <text class="sub" x="500" y="200" style="font-weight:600;">4 &#183; infer</text>
  <text class="cd mono" x="500" y="216">stages/infer.py</text>
  <text class="it"  x="500" y="238">evaluate net on</text>
  <text class="it"  x="500" y="253">grid; time</text>
  <text class="it mono" x="500" y="268">infer_ms</text>

  <!-- 5. evaluate -->
  <rect class="bx" x="644" y="180" width="142" height="96" rx="9"/>
  <text class="sub" x="656" y="200" style="font-weight:600;">5 &#183; evaluate</text>
  <text class="cd mono" x="656" y="216">stages/evaluate.py</text>
  <text class="it"  x="656" y="238">relative-L2 vs</text>
  <text class="it"  x="656" y="253">anchor</text>
  <text class="it"  x="656" y="268">(leakage-safe)</text>

  <!-- 6. export -->
  <rect class="bx" x="800" y="180" width="142" height="96" rx="9"/>
  <text class="sub" x="812" y="200" style="font-weight:600;">6 &#183; export</text>
  <text class="cd mono" x="812" y="216">stages/export.py</text>
  <text class="it"  x="812" y="238">bake trace +</text>
  <text class="it"  x="812" y="253">manifest +</text>
  <text class="it"  x="812" y="268">lane verdict</text>

  <!-- chain arrows (between boxes, in the 14px gaps) -->
  <path class="flow" d="M163,228 L174,228" marker-end="url(#offline-pipeline-arrow)"/>
  <path class="flow" d="M319,228 L330,228" marker-end="url(#offline-pipeline-arrow)"/>
  <path class="flow" d="M475,228 L486,228" marker-end="url(#offline-pipeline-arrow)"/>
  <path class="flow" d="M631,228 L642,228" marker-end="url(#offline-pipeline-arrow)"/>
  <path class="flow" d="M787,228 L798,228" marker-end="url(#offline-pipeline-arrow)"/>

  <!-- ===== notes near stages ===== -->
  <text class="mu" x="344" y="298" style="fill:var(--accent);">the heavy SOTA stage</text>
  <text class="mu" x="656" y="298">anchor = analytic / dataset / Ghia</text>

  <!-- flow-store: export -> artifact contract -->
  <path class="flow-store" d="M871,276 L871,372" marker-end="url(#offline-pipeline-arrow)"/>
  <text class="lbl" x="879" y="334" style="fill:var(--good);">baked</text>

  <!-- ===== BOTTOM BAND: ARTIFACT CONTRACT ===== -->
  <rect class="bx bx-store" x="600" y="374" width="342" height="120" rx="10"/>
  <text class="sub" x="616" y="396" style="fill:var(--good);font-weight:600;">ARTIFACT CONTRACT</text>
  <text class="it"  x="616" y="416">manifest <tspan class="cd mono">pinnlab.manifest/v1</tspan></text>
  <text class="it"  x="616" y="434">field trace <tspan class="cd mono">pinnlab.field/v1</tspan></text>
  <text class="it"  x="616" y="452">index <tspan class="cd mono">pinnlab.index/v1</tspan></text>
  <text class="cd mono" x="616" y="474">core/manifest.py &#183; core/trace.py</text>

  <!-- ===== determinism footer band ===== -->
  <rect class="grp" x="20" y="392" width="540" height="102" rx="10"/>
  <text class="sub" x="36" y="414" style="font-weight:600;">determinism envelope</text>
  <text class="mu" x="36" y="436">Same (case, seed) &#8594; byte-identical artifacts on every re-run.</text>
  <text class="mu" x="36" y="456">No network, no wall-clock branching, no hidden global state.</text>
  <text class="mu" x="36" y="476">Seeds resolved in <tspan class="cd mono">core/rng.py</tspan>; lane gate in <tspan class="cd mono">core/gate.py</tspan>.</text>
</svg>
